<nav style="background: #333; padding: 15px; display: flex; gap: 20px; font-family: sans-serif; align-items: center;">
  <a routerLink="/login" routerLinkActive="active" style="color: white; text-decoration: none; font-weight: bold;">Вхід / Реєстрація</a>
  
  @if (authService.isLoggedIn()) {
    <a routerLink="/resume" routerLinkActive="active" style="color: white; text-decoration: none; font-weight: bold;">Моє Резюме</a>
    
    <button (click)="logout()" style="margin-left: auto; background: #dc3545; color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-weight: bold;">
      Вийти
    </button>
  }
</nav>

<div style="padding: 20px; background: #f4f6f9; min-height: calc(100vh - 50px); font-family: sans-serif;">
  <router-outlet></router-outlet>
</div>
